name: 'units-test'
on:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  # unit tests
  units:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm ci
      - run: npm test

  # test action works running from the graph
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # GitHub Actions caută action.yml în path-ul specificat, deci ./ înseamnă: <root-of-current-repo>/action.yml
      - uses: ./
        id: issue
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Test Issue
          body: Test issue body
          assignees: |
            alialaa
      - run: echo ${{ steps.issue.outputs.issue }}
